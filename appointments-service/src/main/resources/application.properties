server.port=8083

spring.data.mongodb.uri=${MONGODB_URI:mongodb://mongodb:27017/medicalsystem}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

logging.level.org.springframework=INFO

# Use shared HMAC secret from auth-service for JWT verification
jwt.secret=${JWT_SECRET:change-this-secret-for-prod}
