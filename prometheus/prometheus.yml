global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'


  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'profiles-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['profiles-service:8084']

  - job_name: 'records-billing-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['records-billing-service:8085']

  - job_name: 'appointments-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['appointments-service:8083']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
