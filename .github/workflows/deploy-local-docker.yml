name: Deploy Local Docker Stack

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  COMPOSE_ENV: prod

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-local-docker
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via Docker Compose
    # This must run on your local self-hosted runner that has Docker + Compose.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main')
    runs-on:
      - self-hosted
      - local-docker
    env:
      GHCR_OWNER: ${{ github.repository_owner }}

    steps:
      - name: Checkout CI commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout manual commit
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Verify Docker and Compose
        run: |
          docker --version
          docker compose version

      - name: Deploy stack
        run: |
          docker compose pull --ignore-pull-failures
          docker compose up -d --no-build --remove-orphans

      - name: Show running services
        run: docker compose ps

      - name: Wait for stack endpoints
        run: |
          echo "Waiting for frontend API and gateway API to become healthy..."
          for i in $(seq 1 30); do
            FRONTEND_OK=0
            GATEWAY_OK=0

            if curl -sSf http://localhost:3000/api/public/today-at-a-glance -o /dev/null; then
              FRONTEND_OK=1
            fi
            if curl -sSf http://localhost:8080/api/health -o /dev/null; then
              GATEWAY_OK=1
            fi

            if [ "$FRONTEND_OK" -eq 1 ] && [ "$GATEWAY_OK" -eq 1 ]; then
              echo "Stack healthy"
              exit 0
            fi

            sleep 3
            echo "Retry $i/30..."
          done
          echo "Stack did not become healthy in time" >&2
          exit 1

      - name: Prune dangling images
        run: docker image prune -f
