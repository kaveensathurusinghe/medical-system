name: CI

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

permissions:
  contents: read
  packages: write
  actions: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  java-services-test:
    name: Java Service Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/medicalsystem
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: profiles-service
            path: profiles-service
            useWrapper: true
          - service: records-billing-service
            path: records-billing-service
            useWrapper: true
          - service: appointments-service
            path: appointments-service
            useWrapper: false
          - service: auth-service
            path: auth-service
            useWrapper: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper is executable
        if: matrix.useWrapper
        run: chmod +x "${{ matrix.path }}/mvnw"

      - name: Run service tests
        run: |
          if [ "${{ matrix.useWrapper }}" = "true" ]; then
            (cd "${{ matrix.path }}" && ./mvnw -B -Dcyclonedx.skip=true test)
          else
            mvn -B -f "${{ matrix.path }}/pom.xml" -Dcyclonedx.skip=true test
          fi

  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - java-services-test
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build auth-service jar for Docker context
        run: mvn -B -f auth-service/pom.xml -DskipTests -Dcyclonedx.skip=true package

      - name: Build profiles-service image
        run: docker build -t medicalsystem-profiles:ci ./profiles-service

      - name: Build records-billing-service image
        run: docker build -t medicalsystem-records-billing:ci ./records-billing-service

      - name: Build appointments-service image
        run: docker build -t medicalsystem-appointments:ci ./appointments-service

      - name: Build auth-service image
        run: docker build -t medicalsystem-auth:ci -f auth-service/Dockerfile .

      - name: Build frontend image
        run: docker build -t medicalsystem-frontend:ci ./frontend

      - name: Validate Docker Compose file
        run: docker compose config > /dev/null

  docker-publish:
    name: Build & Publish Images (GHCR)
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build auth-service jar for Docker context
        run: mvn -B -f auth-service/pom.xml -DskipTests -Dcyclonedx.skip=true package

      - name: Build and push profiles-service image
        uses: docker/build-push-action@v4
        with:
          context: ./profiles-service
          file: ./profiles-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-profiles:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-profiles:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push records-billing-service image
        uses: docker/build-push-action@v4
        with:
          context: ./records-billing-service
          file: ./records-billing-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-records-billing:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-records-billing:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push appointments-service image
        uses: docker/build-push-action@v4
        with:
          context: ./appointments-service
          file: ./appointments-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-appointments:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-appointments:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push auth-service image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-auth:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-auth:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-frontend:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
