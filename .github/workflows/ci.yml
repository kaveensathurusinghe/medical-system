name: CI

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

permissions:
  contents: read
  packages: write
  actions: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-test:
    name: Backend Test (Java 21)
    runs-on: ubuntu-latest
    env:
      MONGODB_URI: mongodb://localhost:27017/medicalsystem
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10s
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw -B -Dcyclonedx.skip=true test

  frontend-build:
    name: Frontend Build (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t medicalsystem-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t medicalsystem-frontend:ci ./frontend

      - name: Validate Docker Compose file
        run: docker compose config > /dev/null

  docker-publish:
    name: Build & Publish Images (GHCR)
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-backend:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/medical-system-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/medical-system-frontend:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
