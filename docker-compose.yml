services:
  mongodb:
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    image: mongo:7.0
    container_name: medicalsystem-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  profiles-service:
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    image: ghcr.io/${GHCR_OWNER:-kaveensathurusinghe}/medical-system-profiles:${PROFILES_IMAGE_TAG:-latest}
    build:
      context: ./profiles-service
      dockerfile: Dockerfile
    container_name: medicalsystem-profiles
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/medicalsystem}
    depends_on:
      mongodb:
        condition: service_healthy
      appointments-service:
        condition: service_started
      records-billing-service:
        condition: service_started
    expose:
      - "8084"

  records-billing-service:
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    image: ghcr.io/${GHCR_OWNER:-kaveensathurusinghe}/medical-system-records-billing:${RECORDS_BILLING_IMAGE_TAG:-latest}
    build:
      context: ./records-billing-service
      dockerfile: Dockerfile
    container_name: medicalsystem-records-billing
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/medicalsystem}
    depends_on:
      mongodb:
        condition: service_healthy
      appointments-service:
        condition: service_started
      
    expose:
      - "8085"

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: ghcr.io/${GHCR_OWNER:-kaveensathurusinghe}/medical-system-auth:${AUTH_IMAGE_TAG:-latest}
    container_name: medicalsystem-auth
    restart: unless-stopped
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    environment:
      - SPRING_PROFILES_ACTIVE=default
    ports:
      - "8081:8081"

  appointments-service:
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    build:
      context: ./appointments-service
      dockerfile: Dockerfile
    image: ghcr.io/${GHCR_OWNER:-kaveensathurusinghe}/medical-system-appointments:${APPTS_IMAGE_TAG:-latest}
    container_name: medicalsystem-appointments
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/medicalsystem}
    depends_on:
      mongodb:
        condition: service_healthy
    expose:
      - "8083"

  gateway:
    image: nginx:alpine
    container_name: medicalsystem-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - profiles-service
      - records-billing-service
      - appointments-service
      - auth-service

  frontend:
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    image: ghcr.io/${GHCR_OWNER:-kaveensathurusinghe}/medical-system-frontend:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medicalsystem-frontend
    restart: unless-stopped
    depends_on:
      - profiles-service
      - records-billing-service
      - appointments-service
      - auth-service
    ports:
      - "3000:80"
 
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - profiles-service
      - records-billing-service
      - appointments-service
      - auth-service

  grafana:
    image: grafana/grafana:9.4.7
    container_name: grafana
    restart: unless-stopped
    env_file:
      - .env.${COMPOSE_ENV:-prod}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # cadvisor removed due to macOS cgroup incompatibility (causes restarts)

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

volumes:
  mongo_data:
  prometheus_data:
  grafana_data:
